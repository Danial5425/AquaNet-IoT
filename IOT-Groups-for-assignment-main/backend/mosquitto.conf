# Mosquitto MQTT Broker Configuration for AquaNet
# Place this file at /etc/mosquitto/conf.d/aquanet.conf
# Or run: mosquitto -c mosquitto.conf

# Listener
listener 1883
protocol mqtt

# WebSocket support (for browser-based MQTT clients)
listener 9001
protocol websockets

# Allow anonymous connections (for development)
allow_anonymous true

# Persistence
persistence true
persistence_location ./data/

# Logging
log_type all
log_dest stdout
